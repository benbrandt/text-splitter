# This file is based on maturin-generated CI.
# To update the base workflow, run
#
#    maturin generate-ci -m Cargo.toml -o ../../.github/workflows/python.yml --pytest github
#
# Keep the additional PyO3 0.29 free-threaded/abi3t wheel builds below.

name: Python

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: bindings/python

permissions:
  contents: read

jobs:
  min_supported_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: "py310_linux"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: x86_64
          args: --release --out dist
          manylinux: 2_28
          working-directory: bindings/python
      - name: pytest
        shell: bash
        run: |
          set -e
          pip install --force-reinstall --no-index --find-links dist semantic-text-splitter
          pip install pytest tokenizers tree-sitter tree-sitter-python
          pytest

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64, armv7, s390x, ppc64le]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: linux-${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: 2_28
          working-directory: bindings/python
      - name: pytest
        if: ${{ startsWith(matrix.target, 'x86_64') }}
        shell: bash
        run: |
          set -e
          pip install --force-reinstall --no-index --find-links dist semantic-text-splitter
          pip install pytest tokenizers tree-sitter tree-sitter-python
          pytest
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.14t
          manylinux: 2_28
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: bindings/python/dist
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.target }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: windows-${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: bindings/python
      - name: pytest
        if: ${{ !startsWith(matrix.target, 'x86') }}
        shell: bash
        run: |
          set -e
          pip install --force-reinstall --no-index --find-links dist semantic-text-splitter
          pip install pytest tokenizers tree-sitter tree-sitter-python
          pytest
      - name: Set up free-threaded Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          architecture: ${{ matrix.target }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.14t
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: bindings/python/dist
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: macox-${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: bindings/python
      - name: pytest
        if: ${{ startsWith(matrix.target, 'aarch64') }}
        shell: bash
        run: |
          set -e
          pip install --force-reinstall --no-index --find-links dist semantic-text-splitter
          pip install pytest tokenizers tree-sitter tree-sitter-python
          pytest
      - name: Set up free-threaded Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.14t
          working-directory: bindings/python
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: bindings/python/dist
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: sdist
      # There is an issue with sdist build where duplicate readmes are found for some reason.
      - run: rm ../../README.md
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: bindings/python/dist
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/v')"
    needs: [linux, windows, macos, sdist]
    # This job doesn't check out the repo, so override the workflow-level
    # default that sets the working directory to bindings/python.
    defaults:
      run:
        working-directory: .
    steps:
      # Flatten every wheel artifact and the sdist into dist/ so `uv publish`
      # can pick them up with its default dist/* path. This matches the
      # "download all artifacts to dist/* and run uv publish" workflow
      # recommended by uv itself.
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          # No checkout happens here, so there are no dependency files to
          # cache against. Disable the cache to avoid warnings.
          enable-cache: "false"
      - run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
